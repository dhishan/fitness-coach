name: Release IPA

on:
  push:
    tags:
      - 'mobile-v*'

permissions:
  contents: write   # to upload to GH Release
  id-token: write   # WIF auth to GCP for shared bucket upload

jobs:
  build-ipa:
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      VERSION: ${{ github.ref_name }}   # e.g. "mobile-v1.0.1"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history + tags for the changelog

      - name: Build changelog from commits since last mobile tag
        id: changelog
        run: |
          PREV=$(git tag -l 'mobile-v*' --sort=-v:refname | grep -v "^$VERSION$" | head -1)
          if [ -z "$PREV" ]; then
            RANGE="HEAD"
          else
            RANGE="$PREV..HEAD"
          fi
          echo "Comparing $RANGE"
          # First-line of each commit body; drop chore/ci/docs/test prefixes that
          # users don't care about; rewrite conventional prefixes to plain words.
          LOG=$(git log "$RANGE" --no-merges --pretty=format:'%s' -- mobile/ backend/app/ \
            | grep -vE '^(chore|ci|docs|test)(\(|:)' \
            | sed -E 's/^(feat|fix|perf)\([^)]*\): */- /; s/^(feat|fix|perf): */- /' \
            | sed -E 's/^([A-Za-z])/- \1/' \
            | head -10)
          if [ -z "$LOG" ]; then
            LOG="- Minor improvements and fixes"
          fi
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "--- changelog ---"
          echo "$LOG"

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install workspace deps
        run: npm install --no-audit --no-fund

      - name: Inject release version into app.json
        # AltStore validates that the IPA's CFBundleShortVersionString matches
        # the version in altstore.json. Strip the "mobile-v" prefix off the tag
        # and write it into mobile/app.json before prebuild so it lands in
        # Info.plist.
        run: |
          VER="${VERSION#mobile-v}"
          python3 - <<EOF
          import json
          p = "mobile/app.json"
          d = json.load(open(p))
          d["expo"]["version"] = "$VER"
          json.dump(d, open(p, "w"), indent=2)
          print("set version to", "$VER")
          EOF
          # Baked into the JS bundle so Settings shows a clean semver for the
          # embedded build (OTAs add +N.sha on top via the OTA workflow).
          echo "EXPO_PUBLIC_OTA_VERSION=$VER" >> "$GITHUB_ENV"

      - name: Expo prebuild (iOS)
        working-directory: mobile
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_MOBILE }}
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Disable script-phase sandboxing (Xcode 16 + Node bundler)
        run: |
          sed -i '' 's/ENABLE_USER_SCRIPT_SANDBOXING = YES/ENABLE_USER_SCRIPT_SANDBOXING = NO/g' \
            mobile/ios/FitnessTracker.xcodeproj/project.pbxproj

      - name: Pod install
        working-directory: mobile/ios
        run: pod install --repo-update

      - name: Archive
        working-directory: mobile/ios
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_MOBILE }}
        run: |
          xcodebuild \
            -workspace FitnessTracker.xcworkspace \
            -scheme FitnessTracker \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/FitnessTracker.xcarchive" \
            -destination 'generic/platform=iOS' \
            archive \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -R "$RUNNER_TEMP/FitnessTracker.xcarchive/Products/Applications/FitnessTracker.app" \
            "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa" && zip -qr "$RUNNER_TEMP/FitnessTracker.ipa" Payload
          ls -lh "$RUNNER_TEMP/FitnessTracker.ipa"

      - name: Upload IPA to GH Release
        env:
          GH_TOKEN: ${{ github.token }}
          CHANGELOG: ${{ steps.changelog.outputs.log }}
        run: |
          NOTES="What's changed:
          $CHANGELOG

          ---
          Built from ${{ github.sha }}."
          gh release create "$VERSION" "$RUNNER_TEMP/FitnessTracker.ipa" \
            --title "Mobile ${VERSION#mobile-}" \
            --notes "$NOTES" \
            || gh release upload "$VERSION" "$RUNNER_TEMP/FitnessTracker.ipa" --clobber

      - name: Auth to GCS for shared source
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Update shared AltStore source (GCS + sibling repo)
        env:
          GH_TOKEN: ${{ secrets.ALTSTORE_PUSH_TOKEN }}
          CHANGELOG: ${{ steps.changelog.outputs.log }}
          GH_REPO: ${{ github.repository }}
        run: |
          export VER="${VERSION#mobile-v}"
          export IPA_SIZE=$(stat -f %z "$RUNNER_TEMP/FitnessTracker.ipa")
          export IPA_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Clone the sibling repo with push access
          git clone "https://x-access-token:${GH_TOKEN}@github.com/dhishan/family-expense-tracker.git" \
            "$RUNNER_TEMP/sibling"

          python3 - <<'PY'
          import json, os
          ver = os.environ["VER"]
          changelog = os.environ.get("CHANGELOG", "").strip() or "- Minor improvements and fixes"
          desc = f"What's changed:\n{changelog}"
          p = f"{os.environ['RUNNER_TEMP']}/sibling/frontend/public/altstore.json"
          d = json.load(open(p))
          bid = "org.blueelephants.fitnesstracker"
          app = next(a for a in d["apps"] if a["bundleIdentifier"] == bid)
          new_v = {
            "version": ver,
            "buildVersion": "1",
            "date": os.environ["IPA_DATE"],
            "localizedDescription": desc,
            "downloadURL": f"https://github.com/{os.environ['GH_REPO']}/releases/download/mobile-v{ver}/FitnessTracker.ipa",
            "size": int(os.environ["IPA_SIZE"]),
            "minOSVersion": "16.0",
          }
          app["versions"] = [new_v] + [v for v in app["versions"] if v["version"] != ver]
          json.dump(d, open(p, "w"), indent=2)
          print("updated", p)
          PY

          # Upload to the shared GCS bucket (primary source going forward).
          gcloud storage cp "$RUNNER_TEMP/sibling/frontend/public/altstore.json" \
            gs://blueelephants-altstore/altstore.json \
            --content-type=application/json \
            --cache-control="public,max-age=60" \
            --project personal-projects-473219

          # Also mirror to the family-expense-tracker repo so the old Firebase URL
          # keeps working for phones subscribed there. Will deprecate eventually.
          cd "$RUNNER_TEMP/sibling"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add frontend/public/altstore.json
          git commit -m "release: fitness-tracker $VERSION (AltStore source)" || echo "no changes"
          git push || true
