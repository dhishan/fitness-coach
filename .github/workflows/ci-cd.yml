name: CI/CD
on:
  push:
    branches: [main]
  pull_request:

env:
  PROJECT_ID: personal-projects-473219
  REGION: us-central1
  TF_ENV: prod

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r backend/requirements-dev.txt
      - run: cd backend && pytest -q

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit -p packages/shared-types
      - run: npm run -w frontend test -- --run
      - run: npm run -w frontend build

  deploy-backend:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true
      - uses: google-github-actions/setup-gcloud@v3
      - run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet
      - name: Build and push image
        run: |
          IMG=${REGION}-docker.pkg.dev/${PROJECT_ID}/fitness-tracker-backend/backend:latest
          docker build -t "$IMG" backend
          docker push "$IMG"
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform apply
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_sentry_dsn_backend: ${{ secrets.SENTRY_DSN_BACKEND }}
          # Public MCP connector (Phase 1/2). Empty secrets keep it inert.
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          TF_VAR_mcp_gateway_secret: ${{ secrets.MCP_GATEWAY_SECRET }}
          # Repo variables (unset falls back to "false" — an empty string would
          # break the backend's pydantic bool parse and Terraform's == "true").
          # Flip to "true" to launch; MCP_OAUTH_ENABLED needs the CF token's
          # Workers KV Storage:Edit scope first.
          TF_VAR_mcp_oauth_enabled: ${{ vars.MCP_OAUTH_ENABLED || 'false' }}
          TF_VAR_public_signup_enabled: ${{ vars.PUBLIC_SIGNUP_ENABLED || 'false' }}
        run: |
          make terraform-init
          make terraform-apply
      - name: Smoke check deployed health
        run: |
          URL=$(terraform -chdir=terraform/main output -raw cloud_run_url)
          for i in $(seq 1 30); do
            curl -fsS "$URL/health" && exit 0
            sleep 2
          done
          echo "health check failed" && exit 1

  deploy-frontend:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [deploy-backend, test-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - name: Build frontend
        env:
          VITE_API_URL: https://fitness-tracker-backend-ix5fldbdya-uc.a.run.app
          VITE_BUILD_ID: ${{ github.sha }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN_WEB }}
          VITE_SENTRY_ENVIRONMENT: prod
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT_WEB: ${{ secrets.SENTRY_PROJECT_WEB }}
        run: npm run -w frontend build
      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@13 deploy --only hosting:fitness-tracker-ble --project personal-projects-473219
        working-directory: frontend
